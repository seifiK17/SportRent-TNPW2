<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportRent – Půjčovna vybavení</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ===== DESIGN TOKENS ===== */
        :root {
            --bg: #0f1117;
            --bg-card: #1a1d27;
            --bg-card-hover: #1f2235;
            --bg-input: #12141c;
            --border: #2a2d3e;
            --border-light: #353852;
            --accent: #f97316;
            --accent-hover: #ea6a0a;
            --accent-dim: rgba(249, 115, 22, 0.12);
            --text: #e8eaf0;
            --text-muted: #7c829a;
            --text-dim: #4a5068;
            --green: #22c55e;
            --green-dim: rgba(34, 197, 94, 0.12);
            --red: #ef4444;
            --red-dim: rgba(239, 68, 68, 0.12);
            --yellow: #eab308;
            --yellow-dim: rgba(234, 179, 8, 0.12);
            --blue: #3b82f6;
            --blue-dim: rgba(59, 130, 246, 0.12);
            --radius: 10px;
            --radius-sm: 6px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .hidden { display: none; }

        /* ===== NAVIGACE ===== */
        .site-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem;
            height: 60px;
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .nav-logo {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.5px;
            text-decoration: none;
            white-space: nowrap;
        }

        #main-nav {
            display: flex;
            gap: 0.25rem;
            flex: 1;
        }

        #main-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.4rem 0.85rem;
            border-radius: var(--radius-sm);
            transition: color 0.15s, background 0.15s;
        }

        #main-nav a:hover { color: var(--text); background: var(--border); }
        #main-nav a.active { color: var(--text); background: var(--accent-dim); color: var(--accent); }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-left: auto;
        }

        #user-info {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* ===== TLAČÍTKA ===== */
        button { cursor: pointer; font-family: 'Barlow', sans-serif; border: none; transition: all 0.15s; }

        .btn-primary {
            background: var(--accent);
            color: white;
            font-weight: 600;
            font-size: 0.875rem;
            padding: 0.5rem 1.1rem;
            border-radius: var(--radius-sm);
        }
        .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-secondary {
            background: var(--blue-dim);
            color: var(--blue);
            font-weight: 600;
            font-size: 0.875rem;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(59, 130, 246, 0.25);
        }
        .btn-secondary:hover:not(:disabled) { background: rgba(59, 130, 246, 0.2); }
        .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-outline {
            background: transparent;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.875rem;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-light);
        }
        .btn-outline:hover { color: var(--text); border-color: var(--text-muted); }

        .btn-large { padding: 0.75rem 1.5rem; font-size: 1rem; }

        .btn-back {
            background: transparent;
            color: var(--text-muted);
            font-size: 0.875rem;
            padding: 0.4rem 0;
            margin-bottom: 1.25rem;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }
        .btn-back:hover { color: var(--text); }

        #logout-btn {
            background: transparent;
            color: var(--text-muted);
            font-size: 0.85rem;
            padding: 0.4rem 0.75rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }
        #logout-btn:hover { color: var(--red); border-color: var(--red); }

        /* ===== LAYOUT ===== */
        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* ===== LOGIN ===== */
        .login-wrapper {
            min-height: calc(100vh - 61px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
        }

        .login-logo {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .login-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            color: var(--accent);
            letter-spacing: 0.5px;
        }

        .login-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .login-form label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: -0.25rem;
        }

        .login-form input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            font-size: 0.95rem;
            padding: 0.65rem 0.9rem;
            width: 100%;
            transition: border-color 0.15s;
        }
        .login-form input:focus { outline: none; border-color: var(--accent); }
        .login-form input::placeholder { color: var(--text-dim); }

        .login-form .btn-primary {
            margin-top: 0.5rem;
            padding: 0.75rem;
            font-size: 1rem;
            width: 100%;
        }

        .login-hint {
            margin-top: 1.25rem;
            font-size: 0.78rem;
            color: var(--text-dim);
            text-align: center;
            line-height: 1.6;
        }

        /* ===== STRÁNKOVÝ HEADER ===== */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .page-header h2, .page-header h3 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .section-gap { margin-top: 2.5rem; }

        .item-count {
            font-size: 0.85rem;
            color: var(--text-muted);
            background: var(--border);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
        }

        /* ===== GRID VYBAVENÍ ===== */
        .equipment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }

        .equipment-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            transition: border-color 0.15s, transform 0.15s;
        }
        .equipment-card:hover { border-color: var(--border-light); transform: translateY(-1px); }
        .equipment-card.card-unavailable { opacity: 0.65; }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .category-tag {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .card-desc {
            font-size: 0.875rem;
            color: var(--text-muted);
            line-height: 1.5;
            flex: 1;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            margin-top: auto;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }

        .card-price {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--accent);
        }

        /* ===== STATUSY ===== */
        .status-badge {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
        }

        .status-available { background: var(--green-dim); color: var(--green); }
        .status-rented { background: var(--accent-dim); color: var(--accent); }
        .status-maintenance { background: var(--yellow-dim); color: var(--yellow); }
        .status-retired { background: var(--red-dim); color: var(--red); }
        .status-overdue { background: var(--red-dim); color: var(--red); }
        .status-returned { background: var(--blue-dim); color: var(--blue); }

        /* ===== DETAIL ===== */
        .detail-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            display: grid;
            grid-template-columns: 280px 1fr;
        }

        .detail-img {
            background: var(--bg-input);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            min-height: 280px;
        }

        .detail-info {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .detail-top-row { display: flex; align-items: center; gap: 0.75rem; }

        .detail-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2rem;
            font-weight: 700;
        }

        .detail-desc {
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .detail-price-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .detail-price-row strong { color: var(--accent); font-size: 1.4rem; }

        .detail-actions { margin-top: auto; }

        .unavail-msg {
            color: var(--text-muted);
            font-style: italic;
            padding: 0.75rem 0;
        }

        /* ===== VÝPŮJČKY ===== */
        .rental-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .rental-row {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .rental-left {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .rental-left strong { font-size: 0.95rem; }

        .rental-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .rental-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
        }

        /* ===== MISC ===== */
        .error-banner {
            background: var(--red-dim);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--red);
            border-radius: var(--radius-sm);
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .empty-msg {
            color: var(--text-muted);
            padding: 2rem 0;
            font-style: italic;
        }

        /* ===== REZERVAČNÍ FORMULÁŘ ===== */
        .reserve-title {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .reserve-form {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .reserve-label {
            font-size: 0.78rem;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .reserve-input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: var(--radius-sm);
            padding: 0.4rem 0.6rem;
            font-family: inherit;
            font-size: 0.85rem;
        }

        .reserve-btn-align {
            align-self: flex-end;
        }

        /* ===== NEBEZPEČNÉ AKCE ===== */
        .btn-danger {
            background: transparent;
            color: var(--red);
            font-weight: 500;
            font-size: 0.875rem;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-light);
        }
        .btn-danger:hover { border-color: var(--red); }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="nav-inner">
            <span class="nav-logo">🏔️ SportRent</span>
            <nav id="main-nav" class="hidden">
                <a href="#katalog">Katalog</a>
                <a href="#vypujcky">Výpůjčky</a>
            </nav>
            <div class="nav-right">
                <span id="user-info" class="hidden"></span>
                <button id="logout-btn" class="hidden">Odhlásit se</button>
            </div>
        </div>
    </header>

    <div class="page">
        <div id="app"></div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
